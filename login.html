<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión ✨</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="login-contenedor">
    <h1>✨ Iniciar Sesión ✨</h1>
    <p class="subtitulo">Bienvenido a KuroBooks</p>

    <form onsubmit="return login()">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" placeholder="Tu nombre kawaii..." required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Tu contraseña secreta..." required>

        <button type="submit">💖 Entrar 💖</button>
    </form>

    <p class="registro-link">
        ¿No tienes cuenta?
        <a href="index.html">Regístrate aquí 💜</a>
    </p>
</div>

<script>
function login() {
    const user = document.getElementById("usuario").value;
    const pass = document.getElementById("password").value;

    const userGuardado = localStorage.getItem("usuario");
    const passGuardada = localStorage.getItem("password");

    if (user === userGuardado && pass === passGuardada) {
        localStorage.setItem("logeado", "true");
        window.location.href = "inicio.html";
        return false;
    } else {
        alert("Usuario o contraseña incorrectos 💔");
        return false;
    }
}
</script>

</body>
</html>

<button onclick="toggleDarkMode()">🌙 Modo oscuro</button>
